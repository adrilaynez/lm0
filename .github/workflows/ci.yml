name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint is BLOCKING on errors (e.g. react-hooks/rules-of-hooks — catches conditional
      # hook crashes). The React-Compiler advisory rules + a style/type backlog are set to
      # `warn` in eslint.config.mjs so they're visible without failing CI; eslint exits 0 on
      # warnings. Burn the warnings down over time, then re-promote rules to error.
      - name: Lint
        run: npx eslint .

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
