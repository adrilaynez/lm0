<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="50%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#2a0a50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <!-- Dot grid — matrix/simulation feel -->
  <g fill="#8b5cf6" opacity="0.35">
    <circle cx="80" cy="90" r="1.5"/><circle cx="160" cy="90" r="1.5"/><circle cx="240" cy="90" r="1.5"/>
    <circle cx="320" cy="90" r="1.5"/><circle cx="400" cy="90" r="1.5"/><circle cx="480" cy="90" r="1.5"/>
    <circle cx="560" cy="90" r="1.5"/><circle cx="640" cy="90" r="1.5"/><circle cx="720" cy="90" r="1.5"/>
    <circle cx="80" cy="170" r="1.5"/><circle cx="160" cy="170" r="1.5"/><circle cx="240" cy="170" r="1.5"/>
    <circle cx="320" cy="170" r="1.5"/><circle cx="400" cy="170" r="1.5"/><circle cx="480" cy="170" r="1.5"/>
    <circle cx="560" cy="170" r="1.5"/><circle cx="640" cy="170" r="1.5"/><circle cx="720" cy="170" r="1.5"/>
    <circle cx="80" cy="250" r="1.5"/><circle cx="160" cy="250" r="1.5"/><circle cx="240" cy="250" r="1.5"/>
    <circle cx="320" cy="250" r="1.5"/><circle cx="400" cy="250" r="1.5"/><circle cx="480" cy="250" r="1.5"/>
    <circle cx="560" cy="250" r="1.5"/><circle cx="640" cy="250" r="1.5"/><circle cx="720" cy="250" r="1.5"/>
    <circle cx="80" cy="330" r="1.5"/><circle cx="160" cy="330" r="1.5"/><circle cx="240" cy="330" r="1.5"/>
    <circle cx="320" cy="330" r="1.5"/><circle cx="400" cy="330" r="1.5"/><circle cx="480" cy="330" r="1.5"/>
    <circle cx="560" cy="330" r="1.5"/><circle cx="640" cy="330" r="1.5"/><circle cx="720" cy="330" r="1.5"/>
  </g>
  <!-- Highlight a few nodes — "glitch" -->
  <circle cx="400" cy="250" r="4" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="320" cy="170" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="480" cy="330" r="3" fill="#a78bfa" opacity="0.7"/>
  <!-- Connecting lines -->
  <g stroke="#8b5cf6" stroke-width="0.6" opacity="0.3">
    <line x1="400" y1="250" x2="320" y2="170"/>
    <line x1="400" y1="250" x2="480" y2="330"/>
  </g>
</svg>
