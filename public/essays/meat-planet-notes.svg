<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1010"/>
      <stop offset="40%" stop-color="#c04020"/>
      <stop offset="100%" stop-color="#e08030"/>
    </linearGradient>
    <radialGradient id="planet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c04020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <!-- Planet/sphere -->
  <circle cx="400" cy="225" r="140" fill="url(#planet)"/>
  <circle cx="400" cy="225" r="140" fill="none" stroke="#ffa07a" stroke-width="1.5" opacity="0.3"/>
  <!-- Orbital ring -->
  <ellipse cx="400" cy="225" rx="200" ry="50" fill="none" stroke="#ffd0a0" stroke-width="1" opacity="0.25"/>
  <!-- Surface "texture" arcs -->
  <g stroke="#ff9060" stroke-width="0.8" fill="none" opacity="0.2">
    <path d="M320,150 Q400,170 480,150"/>
    <path d="M290,200 Q400,225 510,200"/>
    <path d="M310,280 Q400,260 490,280"/>
  </g>
</svg>
