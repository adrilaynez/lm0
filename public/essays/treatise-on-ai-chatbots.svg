<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a0a10"/>
      <stop offset="50%" stop-color="#8a1a10"/>
      <stop offset="100%" stop-color="#c44a00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <!-- Concentric circles — sycophancy loop -->
  <circle cx="400" cy="225" r="50" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="225" r="100" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.28"/>
  <circle cx="400" cy="225" r="160" fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.18"/>
  <circle cx="400" cy="225" r="220" fill="none" stroke="#fca5a5" stroke-width="0.5" opacity="0.1"/>
  <!-- Enlightenment-era column shapes (vertical lines) -->
  <g stroke="#fed7aa" stroke-width="1" opacity="0.18">
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="110" y1="0" x2="110" y2="450"/>
    <line x1="690" y1="0" x2="690" y2="450"/><line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Center cross/schism mark -->
  <line x1="380" y1="205" x2="420" y2="245" stroke="#fef2f2" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="205" x2="380" y2="245" stroke="#fef2f2" stroke-width="2" opacity="0.6"/>
</svg>
