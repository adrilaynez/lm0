<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2e18"/>
      <stop offset="50%" stop-color="#0e5030"/>
      <stop offset="100%" stop-color="#0a6a50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <!-- Hexagonal pattern — Xanadu links/nodes -->
  <g stroke="#6ee7b7" stroke-width="0.8" fill="none" opacity="0.22">
    <polygon points="400,130 443,155 443,205 400,230 357,205 357,155"/>
    <polygon points="400,230 443,255 443,305 400,330 357,305 357,255"/>
    <polygon points="486,130 529,155 529,205 486,230 443,205 443,155"/>
    <polygon points="314,130 357,155 357,205 314,230 271,205 271,155"/>
    <polygon points="486,230 529,255 529,305 486,330 443,305 443,255"/>
    <polygon points="314,230 357,255 357,305 314,330 271,305 271,255"/>
  </g>
  <!-- Bidirectional link lines — Ted Nelson's transclusion -->
  <g stroke="#a7f3d0" stroke-width="1" opacity="0.35">
    <line x1="100" y1="180" x2="320" y2="180"/><line x1="480" y1="180" x2="700" y2="180"/>
    <line x1="100" y1="270" x2="320" y2="270"/><line x1="480" y1="270" x2="700" y2="270"/>
  </g>
  <g fill="#6ee7b7" opacity="0.5">
    <circle cx="100" cy="180" r="3"/><circle cx="700" cy="180" r="3"/>
    <circle cx="100" cy="270" r="3"/><circle cx="700" cy="270" r="3"/>
  </g>
</svg>
